<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Our Album ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="album.css">

</head>

<body>

<div class="bg"></div>

<div class="petals">
<span>🌸</span>
<span>🌸</span>
<span>🌺</span>
<span>🌼</span>
<span>💮</span>
</div>

<section class="album">

<div class="tag">
♡ OUR ALBUM ♡
</div>

<h1>Our Little Album</h1>

<p class="subtitle">
A few of my favourite moments with you ❤️
</p>

<div class="viewer">

<button id="prev" class="arrow">
❮
</button>

<div class="polaroid">

<div class="tape"></div>

<div class="imageBox">

<img id="photo"
src="photo1.jpg"
draggable="false">

</div>

<div class="memory">

MEMORY

<span id="count">
01
</span>

/

03

</div>

<p id="caption">

Every picture with you becomes my favourite memory. ❤️

</p>

</div>

<button id="next" class="arrow">
❯
</button>

</div>

<div class="dots">

<span class="dot active"></span>

<span class="dot"></span>

<span class="dot"></span>

</div>

<button class="wishBtn"
onclick="location.href='wish.html'">

PICK A WISH →

</button>

</section>

<script src="album.js"></script>

</body>

</html>
